name: rupay
description: "A new Flutter project."

publish_to: 'none'

version: 1.5.2+34

environment:
  sdk: '>=3.2.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  get: ^4.6.5
  get_storage: ^2.0.3
  freezed_annotation: ^2.2.0
  json_annotation: ^4.8.0
  firebase_core: ^2.4.1
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.2.1
  firebase_crashlytics: ^3.0.9
  google_fonts: ^4.0.2
  email_validator: ^2.1.17
  cached_network_image: ^3.2.3
  carousel_slider: ^5.0.0
  intl: ^0.17.0
  shimmer: ^2.0.0
  dropdown_search: ^5.0.6
  url_launcher: ^6.1.7
  share_plus: ^11.0.0
  google_sign_in: ^6.0.1
  sign_in_with_apple: ^7.0.1
  image_picker: ^0.8.6
  pinput: ^2.2.31
  flutter_carousel_slider: ^1.1.0
  flutter_staggered_grid_view: ^0.4.0
  bottom_picker: ^2.0.1
  multi_select_flutter: ^4.1.3
  rotated_corner_decoration: ^2.1.0+1
  pdf: ^3.10.1
  flutter_pdfview: ^1.4.0+1
  path_provider: ^2.0.14
  permission_handler: ^12.0.0+1
  in_app_update: ^4.0.1
  upgrader: ^11.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^2.0.0
  build_runner: ^2.3.3
  freezed: ^2.3.2
  json_serializable: ^6.5.4
  path_provider: ^2.0.15
  permission_handler: ^12.0.0+1


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/common/
    - assets/controls/
    - assets/home/
    - assets/dashboard/
    - assets/app_icon/
    - assets/settings/

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Light.ttf
        - asset: assets/fonts/OpenSans-SemiBold.ttf
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Medium.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf